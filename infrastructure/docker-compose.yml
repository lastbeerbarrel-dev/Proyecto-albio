version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: albion_postgres
    environment:
      POSTGRES_USER: albion
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: albion_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: albion_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nats:
    image: nats:latest
    container_name: albion_nats
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres_data:
  redis_data:
